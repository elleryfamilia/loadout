# --- UI assets (not workflow content) ---------------------------------------
#
# Everything above this line is workflow *content* (skill/command text) that
# feeds a `[[workflows]]` step's `instructions`. The entries below are plain
# static assets the plan viewer (`src/plan/render.rs`, `src/plan/icons.rs`)
# embeds at compile time via `include_str!` — an icon vocabulary and a web
# font. Same faithfulness contract (pin by resolved commit, keep the license
# file, record what changed), but there's no `step` — these aren't tied to a
# workflow stage, so that column is omitted rather than left meaningless.

[[source]]
id = "lucide"
repo = "lucide-icons/lucide"
homepage = "https://lucide.dev"
license = "ISC (some icons additionally MIT via the Feather project — see vendored/lucide/LICENSE, which is the upstream file verbatim)"
ref_strategy = "release"
release = "1.23.0"
commit = "c67c9bdbfb43b0ecd69b52d37aeb4ab2d5386271"
note = """
16-icon subset for `Phase.icon`/`PlanTask.icon` (see `plan::icons`): \
book-open, bug, database, file-text, flask-conical, git-branch, globe, \
layout-dashboard, package, paintbrush, rocket, search, shield, terminal, \
wrench, zap. Each SVG is vendored byte-for-byte from `icons/<name>.svg` at \
the pinned commit — the renderer strips the outer <svg> wrapper at render \
time (see `render::icon_markup`) rather than the vendored file being \
pre-edited, so a drift diff against upstream stays a straight file compare. \
Upstream has no `icons/layout.svg` (renamed); `layout-dashboard` is used in \
its place.
"""
